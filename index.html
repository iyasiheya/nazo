<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>癒し部屋からの脱出～Yの穏やか村化計画～</title>

<style>

body{
margin:0;
font-family:"Hiragino Kaku Gothic ProN",sans-serif;
text-align:center;
color:#333;

background:
linear-gradient(rgba(255,255,255,0.75),rgba(255,255,255,0.9)),
url("https://images.unsplash.com/photo-1505692794403-35c5c6b1c6d5");

background-size:cover;
background-position:center;

min-height:100vh;
}

.container{

max-width:650px;
margin:auto;
margin-top:40px;

background:rgba(255,255,255,0.95);

padding:40px;

border-radius:14px;

box-shadow:
0 10px 30px rgba(0,0,0,0.2);

}

h1{

font-size:32px;
margin-bottom:10px;

}

#progress{

opacity:0.7;
margin-bottom:20px;

}

img{

max-width:100%;

border-radius:10px;

margin:20px 0;

box-shadow:0 6px 15px rgba(0,0,0,0.2);

}

input{

width:75%;
padding:14px;

border-radius:8px;

border:1px solid #ccc;

font-size:16px;

}

button{

margin-top:18px;

padding:12px 30px;

font-size:16px;

border:none;

border-radius:8px;

cursor:pointer;

background:#eab308;

color:white;

}

button:hover{

transform:scale(1.05);

}

#error{

color:#e11d48;
margin-top:10px;

}

#question{

font-size:20px;
line-height:1.6;

}

</style>

</head>


<body>

<div class="container">

<h1>屋敷の謎を解け</h1>

<div id="progress"></div>

<div id="question"></div>

<img id="image">

<br>

<input id="answer" placeholder="答えを入力">

<br>

<button onclick="submitAnswer()">送信</button>

<p id="error"></p>

</div>


<script>

let current=0

const questions=[

{image:"q1.png",answer:"かぎ"},
{image:"q2.png",answer:"とけい"},
{image:"q3.png",answer:"ほん"},
{image:"q4.png",answer:"ねこ"},
{image:"q5.png",answer:"いぬ"},
{image:"q6.png",answer:"かさ"},
{image:"q7.png",answer:"みず"},
{image:"q8.png",answer:"はな"},
{image:"q9.png",answer:"くるま"},
{image:"q10.png",answer:"でぐち"}

]

function loadQuestion(){

if(current>=questions.length){

document.querySelector(".container").innerHTML=
"<h1>脱出成功！</h1><p>屋敷の謎をすべて解きました。</p>"

return

}

let q=questions[current]

document.getElementById("question").innerHTML=
"問題 "+(current+1)+"：この画像の答えは？"

document.getElementById("progress").innerText=
"問題 "+(current+1)+" / "+questions.length

document.getElementById("image").src=q.image

document.getElementById("answer").value=""

document.getElementById("error").innerText=""

}


function submitAnswer(){

let input=document.getElementById("answer")
.value.trim().toLowerCase()

let correct=questions[current].answer.toLowerCase()

if(input===correct){

current++

loadQuestion()

}else{

document.getElementById("error").innerText="答えが違います"

}

}

loadQuestion()

</script>

</body>
</html>
