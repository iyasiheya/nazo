<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>脱出ゲーム</title>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;

background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.container{
max-width:650px;
padding:30px;
background:rgba(0,0,0,0.5);
border-radius:12px;
}

img{
max-width:100%;
border-radius:10px;
margin-bottom:20px;
}

input{
width:180px;
padding:10px;
border-radius:8px;
border:none;
font-size:16px;
margin-left:10px;
}

button{
margin-top:20px;
padding:10px 28px;
border:none;
border-radius:8px;
background:#ffd700;
font-size:16px;
cursor:pointer;
}

.row{
margin-top:10px;
}

/* 合言葉は の装飾 */
.label-text{
font-size:32px;
font-weight:bold;
color:white;
text-shadow:0 2px 5px rgba(0,0,0,0.8);
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<script>

let current=0
let state="start"
// start / question / correct / wrong / dummy / end

const questions=[
{image:"q1.png",answer:"んがけくずれ",clear:"clear1.png"},
{image:"q2.png",answer:"けいばじょう",clear:"clear2.png"},
{image:"q3.png",answer:"まりこ",clear:"clear3.png"},
{image:"q4.png",answer:"まくぽて",clear:"clear4.png"},
{image:"q5.png",answer:"おやすみと",clear:"clear5.png"},
{image:"q6.png",answer:"ですてぃにー",clear:"clear6.png"},
{image:"q7.png",answer:"げんしん",clear:"clear7.png"},
{image:"q8.png",answer:"ちゃそまる",clear:"clear8.png"},
{image:"q9.png",answer:"いやしへや",clear:"clear9.png"},
{image:"q10.png",answer:"あさめさますだけ",clear:"clear10.png",dummy:"まんいんでんしゃ"}
]

function render(){

const c=document.getElementById("container")

// ---------- スタート ----------
if(state==="start"){
c.innerHTML=`
<img src="start.png">
<br>
<button onclick="startGame()">次の部屋へ進む</button>
`
return
}

// ---------- 問題 ----------
if(state==="question"){

let q=questions[current]

c.innerHTML=`
<img src="${q.image}">
<div class="row">
<label><span class="label-text">合言葉は</span> <input id="answer"></label>
</div>
<button onclick="submitAnswer()">送信</button>
`

document.getElementById("answer").addEventListener("keydown",function(e){
if(e.key==="Enter"){submitAnswer()}
})

return
}

// ---------- 正解 ----------
if(state==="correct"){

let q=questions[current]

c.innerHTML=`
<img src="${q.clear}">
<br>
<button onclick="nextQuestion()">次の部屋へ進む</button>
`
return
}

// ---------- ダミー（10問目専用） ----------
if(state==="dummy"){
c.innerHTML=`
<img src="dummy.png">
<br>
<button onclick="retry()">戻る</button>
`
return
}

// ---------- 不正解 ----------
if(state==="wrong"){
c.innerHTML=`
<img src="miss.png">
<br>
<button onclick="retry()">戻る</button>
`
return
}

// ---------- 最終 ----------
if(state==="end"){
c.innerHTML=`
<img src="final.png">
`
return
}

}

// ===== 処理 =====

function startGame(){
state="question"
render()
}

function submitAnswer(){

let input=document.getElementById("answer").value.trim().toLowerCase()
let q=questions[current]
let correct=q.answer.toLowerCase()

if(input===correct){
state="correct"

}else if(current===9 && input===q.dummy.toLowerCase()){
state="dummy"

}else{
state="wrong"
}

render()
}

function nextQuestion(){
current++
if(current>=questions.length){
state="end"
}else{
state="question"
}
render()
}

function retry(){
state="question"
render()
}

render()

</script>

</body>
</html>
