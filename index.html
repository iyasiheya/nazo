<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>脱出ゲーム</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px;
}

img{
max-width:100%;
margin:20px 0;
border-radius:10px;
}

input{
width:80%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
}

#error{
color:#f87171;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>脱出ゲーム</h1>

<div id="progress"></div>

<div id="question"></div>

<img id="image" style="display:none">

<br>

<input id="answer" placeholder="答え">

<br>

<button onclick="submitAnswer()">送信</button>

<p id="error"></p>

</div>

<script>

let current=0

const questions=[

{
text:"この果物は？",
image:"q1.png",
answer:"りんご"
},

{
text:"この動物は？",
image:"q2.png",
answer:"ねこ"
},

{
text:"この国旗の国は？",
image:"q3.png",
answer:"日本"
},

{
text:"この数字は？",
image:"q4.png",
answer:"7"
},

{
text:"このロゴの会社は？",
image:"q5.png",
answer:"apple"
}

]

function loadQuestion(){

if(current>=questions.length){

document.querySelector(".container").innerHTML=
"<h1>脱出成功！</h1>"

return

}

let q=questions[current]

document.getElementById("question").innerHTML=q.text

document.getElementById("progress").innerText=
"問題 "+(current+1)+" / "+questions.length

let img=document.getElementById("image")

if(q.image){

img.src=q.image
img.style.display="block"

}else{

img.style.display="none"

}

document.getElementById("answer").value=""
document.getElementById("error").innerText=""

}

function submitAnswer(){

let input=document.getElementById("answer")
.value.trim().toLowerCase()

let correct=questions[current].answer
.toLowerCase()

if(input===correct){

current++

loadQuestion()

}else{

document.getElementById("error").innerText="違います"

}

}

loadQuestion()

</script>

</body>
</html>
