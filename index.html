<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>癒し部屋からの脱出</title>

<style>

body{

margin:0;
font-family:sans-serif;
text-align:center;
color:white;

/* 背景そのまま表示 */

background-image:url("background.png");
background-size:cover;
background-position:center;
background-attachment:fixed;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

/* 問題表示枠 */

.container{

max-width:650px;
padding:40px;

/* 半透明 */

background:rgba(0,0,0,0.4);

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

}

h1{

margin-bottom:10px;

}

#progress{

margin-bottom:15px;

}

img{

max-width:100%;
margin:20px 0;
border-radius:8px;

}

input{

width:75%;
padding:12px;

border-radius:8px;
border:none;

font-size:16px;

}

button{

margin-top:15px;

padding:10px 28px;

border:none;
border-radius:8px;

background:#ffd700;

font-size:16px;

cursor:pointer;

}

#error{

margin-top:10px;
color:#ff8080;

}

</style>

</head>


<body>

<div class="container">

<h1>癒し部屋からの脱出～Yの穏やか村化計画～</h1>

<div id="progress"></div>

<img id="image">

<br>

<input id="answer" placeholder="答え">

<br>

<button onclick="submitAnswer()">送信</button>

<p id="error"></p>

</div>


<script>

let current=0

const questions=[

{image:"q1.png",answer:"かぎ"},
{image:"q2.png",answer:"とけい"},
{image:"q3.png",answer:"ほん"},
{image:"q4.png",answer:"ねこ"},
{image:"q5.png",answer:"いぬ"},
{image:"q6.png",answer:"かさ"},
{image:"q7.png",answer:"みず"},
{image:"q8.png",answer:"はな"},
{image:"q9.png",answer:"くるま"},
{image:"q10.png",answer:"でぐち"}

]

function loadQuestion(){

if(current>=questions.length){

document.querySelector(".container").innerHTML=
"<h1>クリア！</h1><p>すべての問題を解きました。</p>"

return

}

let q=questions[current]

document.getElementById("progress").innerText=
"問題 "+(current+1)+" / "+questions.length

document.getElementById("image").src=q.image

document.getElementById("answer").value=""

document.getElementById("error").innerText=""

}

function submitAnswer(){

let input=document.getElementById("answer")
.value.trim().toLowerCase()

let correct=questions[current].answer.toLowerCase()

if(input===correct){

current++

loadQuestion()

}else{

document.getElementById("error").innerText="答えが違います"

}

}

loadQuestion()

</script>

</body>
</html>
