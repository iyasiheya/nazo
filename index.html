<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>オンライン脱出ゲーム</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
margin-bottom:10px;
}

img{
max-width:100%;
border-radius:8px;
margin:20px 0;
}

input{
width:80%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

#error{
color:#f87171;
margin-top:10px;
}

#progress{
margin-bottom:15px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<h1>研究室からの脱出</h1>

<div id="progress"></div>

<div id="question"></div>

<img id="image" style="display:none">

<br>

<input id="answer" placeholder="答えを入力">

<br>

<button onclick="submitAnswer()">送信</button>

<p id="error"></p>

</div>

<script>

let current=0

const questions=[

{
text:"次の数列の次は？<br>1 3 5 7 ?",
answer:"9"
},

{
text:"英語で『りんご』は？",
answer:"apple"
},

{
text:"曜日の並び<br>月 火 水 木 金 ?",
answer:"土"
},

{
text:"A=1 B=2 C=3 のとき CAT は？",
answer:"3120"
},

{
text:"鏡文字を読め<br>ƎMƆO⅃ƎW",
answer:"welcome"
},

{
text:"5×5は？",
answer:"25"
},

{
text:"次の単語の共通点は？<br>犬 猫 牛",
answer:"動物"
},

{
text:"富士山の高さ(メートル)",
answer:"3776"
},

{
text:"日本の首都",
answer:"東京"
},

{
text:"最後の暗号<br>ESCAPEを日本語で",
answer:"脱出"
}

]

function loadQuestion(){

if(current>=questions.length){

document.querySelector(".container").innerHTML=
"<h1>脱出成功！</h1><p>すべての謎を解きました</p>"

return
}

let q=questions[current]

document.getElementById("question").innerHTML=q.text

document.getElementById("progress").innerText=
"問題 "+(current+1)+" / "+questions.length

document.getElementById("answer").value=""
document.getElementById("error").innerText=""

}

function submitAnswer(){

let input=document.getElementById("answer")
.value.trim().toLowerCase()

let correct=questions[current].answer
.toLowerCase()

if(input===correct){

current++

loadQuestion()

}else{

document.getElementById("error")
.innerText="答えが違います"

}

}

loadQuestion()

</script>

</body>
</html>
