<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>癒し部屋からの脱出</title>

<style>

body{
margin:0;
font-family:sans-serif;
text-align:center;

background-image:url("background.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

.container{
max-width:650px;
padding:30px;
background:rgba(0,0,0,0.5);
border-radius:12px;
}

img, video{
max-width:100%;
border-radius:10px;
margin-bottom:20px;
}

input{
width:180px;
padding:10px;
border-radius:8px;
border:none;
font-size:16px;
margin-left:10px;
}

button{
margin-top:20px;
padding:10px 28px;
border:none;
border-radius:8px;
background:#ffd700;
font-size:16px;
cursor:pointer;
}

.row{
margin-top:10px;
}

.label-text{
font-size:32px;
font-weight:bold;
color:white;
text-shadow:0 2px 5px rgba(0,0,0,0.8);
}

#fadeScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
z-index:9999;
}

#whiteScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:10000;
}

</style>
</head>

<body>

<div class="container" id="container"></div>
<div id="fadeScreen"></div>
<div id="whiteScreen"></div>

<script>

// ===== 音 =====
const bgm = new Audio("bgm.mp3")
const wrongBGM = new Audio("wrong_bgm.mp3")

const correctSE = new Audio("correct.mp3")
const wrongSE = new Audio("wrong.mp3")

bgm.loop = true
wrongBGM.loop = true

bgm.volume = 0.1
wrongBGM.volume = 0.5
correctSE.volume = 1.0
wrongSE.volume = 1.0

// ===== 状態 =====
let current=0
let state="start"

// ===== 問題 =====
const questions=[
{image:"q1.png",answer:"んがけくずれ",clear:"clear1.png"},
{image:"q2.png",answer:"けいばじょう",clear:"clear2.png"},
{image:"q3.png",answer:"まりこ",clear:"clear3.png"},
{image:"q4.png",answer:"まくぽて",clear:"clear4.png"},
{image:"q5.png",answer:"おやすみと",clear:"clear5.png"},
{image:"q6.png",answer:"ですてぃにー",clear:"clear6.png"},
{image:"q7.png",answer:"げんしん",clear:"clear7.png"},
{image:"q8.png",answer:"ちゃそまる",clear:"clear8.png"},
{image:"q9.png",answer:"いやしへや",clear:"clear9.png"},
{image:"q10.png",answer:"あさめさますだけ",clear:"clear10.png",dummy:"まんいんでんしゃ"}
]

// ===== 描画 =====
function render(){

const c=document.getElementById("container")

if(state==="start"){
c.innerHTML=`
<img src="start.png">
<br>
<button onclick="startGame()">次の部屋へ進む</button>
`
return
}

if(state==="question"){
let q=questions[current]

c.innerHTML=`
<img src="${q.image}">
<div class="row">
<label><span class="label-text">合言葉は</span> <input id="answer"></label>
</div>
<button onclick="submitAnswer()">送信</button>
`

document.getElementById("answer").addEventListener("keydown",function(e){
if(e.key==="Enter"){submitAnswer()}
})

return
}

if(state==="correct"){
let q=questions[current]

c.innerHTML=`
<img src="${q.clear}">
<br>
<button onclick="nextQuestion()">次の部屋へ進む</button>
`
return
}

if(state==="dummy"){
c.innerHTML=`
<img src="dummy.png">
<br>
<button onclick="retry()">戻る</button>
`
return
}

if(state==="wrong"){
c.innerHTML=`
<img src="miss.png">
<br>
<button onclick="retry()">戻る</button>
`
return
}

if(state==="end"){
c.innerHTML=`
<video id="endingVideo" src="final.mp4" autoplay playsinline></video>
<div id="endBtn" style="display:none;">
<button onclick="goTitle()">タイトルに戻る</button>
</div>
`

// 動画終了でボタン表示
const v=document.getElementById("endingVideo")
v.onended = ()=>{
document.getElementById("endBtn").style.display="block"
}

return
}

}

// ===== 暗転 =====
function fadeToQuestion(){

const f=document.getElementById("fadeScreen")

f.style.transition = "none"
f.style.opacity = 1

let q = questions[current]
const img = new Image()
img.src = q.image

img.onload = () => {

    setTimeout(()=>{

        state="question"
        render()

        f.style.transition = "opacity 1.2s"
        f.style.opacity = 0

    },300)

}

}

// ===== 白演出 =====
function whiteFlashToClear(){

const w=document.getElementById("whiteScreen")
let q = questions[current]

const img = new Image()
img.src = q.clear

img.onload = () => {

    bgm.pause()
    bgm.currentTime = 0

    w.style.transition = "none"
    w.style.opacity = 1

    setTimeout(()=>{

        state="correct"
        render()

        w.style.transition = "opacity 2s"
        w.style.opacity = 0

    },5000)

}

}

// ===== 処理 =====

function startGame(){
if(bgm.paused){
bgm.currentTime = 0
bgm.play()
}
fadeToQuestion()
}

function submitAnswer(){

let input=document.getElementById("answer").value.trim().toLowerCase()
let q=questions[current]
let correct=q.answer.toLowerCase()

// ★ 隠しコマンド（Q1限定）
if(current===0 && input==="みかす"){
current = 9
fadeToQuestion()
return
}

if(input===correct){

if(current !== 9){
correctSE.currentTime = 0
correctSE.play()
}

if(current===9){
whiteFlashToClear()
return
}

state="correct"

}else if(current===9 && input===q.dummy.toLowerCase()){

bgm.pause()
wrongBGM.currentTime = 0
wrongBGM.play()

state="dummy"

}else{

bgm.pause()
wrongBGM.currentTime = 0
wrongBGM.play()

wrongSE.currentTime = 0
wrongSE.play()

state="wrong"
}

render()
}

function nextQuestion(){

current++

if(current>=questions.length){

bgm.pause()
bgm.currentTime = 0

state="end"

}else{
fadeToQuestion()
return
}

render()
}

function retry(){

wrongBGM.pause()
wrongBGM.currentTime = 0

bgm.play()

fadeToQuestion()
}

// ★ タイトルに戻る
function goTitle(){
current = 0
state = "start"
render()
}

render()

</script>

</body>
</html>
